name: Feature
description: New capability from the roadmap
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What user-facing outcome?
    validations:
      required: true
  - type: input
    id: roadmap
    attributes:
      label: Roadmap PR#
      description: Number from docs/roadmap/full-app-plan.md
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist of observable outcomes
    validations:
      required: true
